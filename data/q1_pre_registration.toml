# Q1 Pre-Registration — JEPA-as-Substrate Research Program
#
# Locks all gate thresholds, instance set, seeds, and budget caps BEFORE
# any data collection. Same discipline as PR #25 noise-floor protocol that
# buried PR #24's optimistic single-seed signal.
#
# Spec ref: docs/superpowers/specs/2026-05-05-jepa-as-substrate-design.md
#           Section 5.5 (pre-registration); 6.9 (pre-registration commits)
# Plan ref: docs/superpowers/plans/2026-05-05-jepa-q1-implementation.md
#           Task 0 (this file); Tasks 2, 7, 8 (consume this file)

schema_version = 1
phase = "Q1"

[q1.instances]
# 10 SWE-bench-Lite instance IDs deterministically chosen.
# 4 are from existing pilot data (psf__requests-3362, pallets__flask-4992,
# pylint-dev__pylint-7080, sphinx-doc__sphinx-8721); 6 are added for
# diversity across project size.
ids = [
  "pallets__flask-4992",
  "pylint-dev__pylint-7080",
  "sphinx-doc__sphinx-8721",
  "psf__requests-3362",
  "astropy__astropy-12907",
  "django__django-11848",
  "matplotlib__matplotlib-23299",
  "scikit-learn__scikit-learn-13497",
  "pytest-dev__pytest-7373",
  "sympy__sympy-13971",
]

[q1.seeds]
# Three coprime seeds for cross-seed variance estimation.
values = [1, 1009, 2018]

[q1.conditions]
# Standard 4-tier microRCS conditions.
values = ["flat", "+autonomic", "+meta", "full"]

[q1.model]
# DEVIATION 2026-05-06 (attempt-3): Haiku 4-5 was the original choice
# "for cost-efficiency; signal-sufficient at this tier". Q1-T8 attempt-2
# verdict (PR #60, commit 438e0bc) showed it was NOT signal-sufficient:
# Haiku's 3.8% pass^1 on SWE-bench-Lite produced 3 positives out of 78
# trajectories — the joint phase gate's G2 (Pearson r) and P1 (Spearman ρ)
# cannot statistically support a -0.2 / -0.15 threshold under that class
# imbalance regardless of substrate quality. Pre-reg power analysis
# (data/q1_pre_registration.toml + spec §5.5) assumed Cohen's h=0.3 around
# 0.5 base rate — the Haiku regime falls outside that assumption.
#
# Sonnet 4-5 was always the planned Q2 model (spec §5.3); using it for Q1
# data collection too is a discipline-preserving fix because:
#   1. Gates (G1/G2/G3/P1/P2) are NOT being tuned — they remain LOCKED.
#   2. The change is to the data-collection configuration upstream of
#      the gate evaluation, not to the gate evaluation itself.
#   3. Sonnet's expected SWE-bench-Lite pass^1 (~15-20%, per existing
#      microRCS pilot data and SWE-bench leaderboard) gives n_positives
#      sufficient for the pre-registered statistical thresholds to discriminate.
#   4. K1 was NOT fired on attempt-2 because three of four gate failures
#      were diagnosed as instrumentation/power, not substrate falsification.
#      A Sonnet re-run resolves the instrumentation/power issue mechanically;
#      the substrate's real signal-or-no-signal verdict is what attempt-3 measures.
#
# This is the only change to [q1.model] across attempts; no further model
# adjustments will be made within Q1. If attempt-3 also FAILs on real signal
# (G1+G2+G3+P1 with adequate base rate), THAT is the second failure that
# triggers K1 per spec §5.5.
provider = "anthropic:claude-sonnet-4-5"

[q1.gate.math]
# G1: median Var ratio < 1.0 across >= 3 conditions
g1_var_ratio_threshold = 1.0
g1_min_conditions_with_data = 3

# G2: Pearson r(λ̂, episode_score) <= -0.2
g2_pearson_threshold = -0.2

# G3: training health
g3_min_std_mean_at_epoch_100 = 0.5
g3_max_loss_increase_consecutive_epochs = 3
g3_no_nan_required = true

[q1.gate.production]
# P1: Spearman ρ(λ̂, pass-bool) <= -0.15 with p < 0.05
p1_spearman_threshold = -0.15
p1_significance_level = 0.05

[q1.training]
# Substrate hyperparameters. Locked.
latent_dim = 64
hidden_dim = 64
epochs = 200
batch_size = 64
learning_rate = 1e-3
ema_momentum = 0.99
vicreg_var_weight = 25.0
vicreg_cov_weight = 1.0

[q1.budget]
# Cost cap per Q1 (auto-abort if exceeded).
#
# DEVIATION 2026-05-06: original max_usd = 10.0 was based on a spec estimate
# of "$0.07-0.10/instance Haiku" which proved 7-10x too low. Realized cost is
# ~$0.70/instance × 10 instances × 4 conditions × 3 seeds = ~$84 total. The
# $10 figure was advisory-only — neither launch_q1_data_collection.sh nor
# swe_pilot.py enforce an aggregate cap (only per-instance --max-cost 2.0
# applies). Watcher cost-extraction was buggy in attempt-2 (read events.jsonl
# instead of seed-*.log) so it never tripped any cap.
#
# Adjusted ceiling reflects realized cost + 35% margin for retries/edge cases:
# 3 seeds × ~$30/seed = $90 expected; $120 cap = hard kill at 33% above
# expected. Watcher (logs/q1-t2-run/q1_t2_watcher.sh) now reads cost from
# seed-*.log per-instance lines and CAN enforce this ceiling.
#
# DEVIATION 2026-05-06 (attempt-3): Sonnet 4-5 input/output token cost is
# ~5x Haiku 4-5 ($3/$15 vs $0.80/$4 per MTok), and Sonnet typically uses
# more tokens per agent step (longer reasoning). Realized Haiku attempt-2
# cost was $79.53 across 84 episodes / 3 seeds. Project Sonnet at
# 4x-5x Haiku throughput-adjusted cost = ~$80/seed × 3 = ~$240; $300 cap
# = hard kill at 25% above expected. Per-instance --max-cost 2.0 stays
# unchanged (still bounds individual runaway).
#
# Pre-reg discipline preserved (both deviations): both adjustments are
# operational — wrong cost estimate (PR #59) and wrong model tier for the
# regime (this attempt). G1/G2/G3/P1/P2 thresholds in this file remain
# LOCKED across all three attempts. Adjustments recorded in BRO-959
# description, logs/q1-t2-run/state.jsonl, and the per-attempt commit
# messages.
max_usd = 300.0
max_wall_clock_hours = 24
