name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  params-drift-check:
    name: Parameters Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify latex/parameters.tex matches data/parameters.toml
        run: python3 scripts/gen_parameters_tex.py --check

  build-latex:
    name: Build LaTeX
    needs: params-drift-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tectonic
        uses: wtfjoke/setup-tectonic@v3
        with:
          tectonic-version: 0.16.8

      - name: Build P0 article format
        run: cd papers/p0-foundations && tectonic main.tex

      - name: Build P0 IEEE format
        run: cd papers/p0-foundations && tectonic main-ieee.tex

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: rcs-papers
          path: papers/*/*.pdf

  test-proofs:
    name: Test Proofs
    needs: params-drift-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Test stability budget
        run: python3 tests/test_stability_budget.py

      - name: Test Lyapunov simulation
        run: python3 tests/test_lyapunov_simulation.py
